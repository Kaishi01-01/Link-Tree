<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Tree - YumeNewbie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Mencegah area putih dan scroll patah */
        html {
            background-color: #000;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

            /* SETTING BACKGROUND DISINI */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://files.catbox.moe/7pxfkh.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Ini agar gambar diam saat di-scroll */
        }

        /* Container konten agar bisa di-scroll dengan mulus */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            flex: 1;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
        }

        .username {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .bio {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
            text-align: center;
            max-width: 320px;
            line-height: 1.5;
        }

        .social-icons {
            display: flex;
            gap: 22px;
            margin-bottom: 35px;
        }

        .social-icons a {
            color: white;
            font-size: 1.8rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover { transform: scale(1.2); }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .link-content { display: flex; align-items: center; gap: 15px; }
        .link-card img { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; }
        .link-text { font-weight: 500; font-size: 1rem; }
        .dots { color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; }

        footer {
            padding: 30px 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://files.catbox.moe/usfjjt.jpg" alt="Profile" class="profile-img">
        
        <h1 class="username">YumeNewbie</h1>
        
        <p class="bio">Cuma newbie yang suka berbagi konten seru setiap hari. Follow ya! ✨</p>

        <div class="social-icons">
            <a href="https://wa.me/6285188448577"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@yumesenpai_offc"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@YumePrst"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/yumesenpai21?igsh=MjE1NXRjYXNtdms0"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="links-container">
            <a href="https://whatsapp.com/channel/0029VbCVaKFLo4hosz3h7n0z" class="link-card">
                <div class="link-content">
                    <img src="https://files.catbox.moe/v9msdk.jpg" alt="WA">
                    <span class="link-text">Saluran WhatsApp</span>
                </div>
                <div class="dots"><i class="fas fa-external-link-alt"></i></div>
            </a>

            <a href="https://whatsapp.com/channel/0029Vb7hbWGAe5Vh4sMc7T1r" class="link-card">
                <div class="link-content">
                    <img src="https://files.catbox.moe/v9msdk.jpg" alt="WA">
                    <span class="link-text">Saluran Info Opmem</span>
                </div>
                <div class="dots"><i class="fas fa-external-link-alt"></i></div>
            </a>

            <a href="https://wa.me/6285188448577" class="link-card">
                <div class="link-content">
                    <img src="https://files.catbox.moe/v9msdk.jpg" alt="WA">
                    <span class="link-text">WhatsApp (Admin)</span>
                </div>
                <div class="dots"><i class="fas fa-ellipsis-v"></i></div>
            </a>

            <a href="https://www.tiktok.com/@yumesenpai_offc" class="link-card">
                <div class="link-content">
                    <img src="https://files.catbox.moe/abmf9a.jpg" alt="TikTok">
                    <span class="link-text">TikTok</span>
                </div>
                <div class="dots"><i class="fas fa-ellipsis-v"></i></div>
            </a>

            <a href="https://www.youtube.com/@YumePrst" class="link-card">
                <div class="link-content">
                    <img src="https://files.catbox.moe/grqb2g.jpg" alt="YouTube">
                    <span class="link-text">YouTube</span>
                </div>
                <div class="dots"><i class="fas fa-ellipsis-v"></i></div>
            </a>

            <a href="https://www.instagram.com/yumesenpai21?igsh=MjE1NXRjYXNtdms0" class="link-card">
                <div class="link-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
                    <span class="link-text">Instagram</span>
                </div>
                <div class="dots"><i class="fas fa-ellipsis-v"></i></div>
            </a>
        </div>

        <footer>
            2024 - 2026 ©Yume
        </footer>
    </div>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true
        })

        function raf(time) {
            lenis.raf(time)
            requestAnimationFrame(raf)
        }
        requestAnimationFrame(raf)
    </script>
</body>
</html>
